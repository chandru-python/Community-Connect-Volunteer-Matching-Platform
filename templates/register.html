{% extends "base.html" %}
{% block title %}Register – Community Connect{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-8 col-lg-6">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <div class="auth-icon"><i class="bi bi-person-plus-fill"></i></div>
            <h2 class="auth-title">Create Account</h2>
            <p class="text-muted">Join the CommunityConnect network today</p>
          </div>

          <form method="POST" action="{{ url_for('register') }}" id="registerForm" novalidate>
            <!-- Role selector (first) -->
            <div class="mb-4">
              <label class="form-label fw-semibold">I want to join as</label>
              <div class="role-selector">
                <input type="radio" class="btn-check" name="role" id="roleVolunteer" value="volunteer" checked>
                <label class="role-btn" for="roleVolunteer">
                  <i class="bi bi-person-heart"></i>
                  <span>Volunteer</span>
                  <small>Find & apply to projects</small>
                </label>
                <input type="radio" class="btn-check" name="role" id="roleOrganizer" value="organizer">
                <label class="role-btn" for="roleOrganizer">
                  <i class="bi bi-building"></i>
                  <span>Organizer</span>
                  <small>Post & manage projects</small>
                </label>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-12">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-group cc-input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control" id="name" name="name"
                         placeholder="Your full name" required>
                </div>
              </div>
              <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group cc-input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control" id="email" name="email"
                         placeholder="you@example.com" required>
                </div>
              </div>
              <div class="col-12">
                <label for="phone" class="form-label">Phone Number <span class="text-muted small">(optional)</span></label>
                <div class="input-group cc-input-group">
                  <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                  <input type="tel" class="form-control" id="phone" name="phone"
                         placeholder="+91 98765 43210">
                </div>
              </div>
              <div class="col-12">
                <label for="password" class="form-label">Password</label>
                <div class="input-group cc-input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="password" name="password"
                         placeholder="Create a strong password" required minlength="6">
                  <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="password-strength mt-1" id="pwStrength"></div>
              </div>
            </div>

            <div class="form-check mt-3">
              <input class="form-check-input" type="checkbox" id="agreeTerms" required>
              <label class="form-check-label small" for="agreeTerms">
                I agree to the <a href="#" class="cc-link">Terms of Service</a> and <a href="#" class="cc-link">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" class="btn cc-btn-primary w-100 mt-4 btn-lg">
              <i class="bi bi-person-check me-2"></i>Create My Account
            </button>
          </form>

          <p class="text-center mt-4 mb-0">
            Already have an account? <a href="{{ url_for('login') }}" class="cc-link fw-semibold">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
