{% extends "base.html" %}
{% block title %}Login – Community Connect{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-8 col-lg-5">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <div class="auth-icon"><i class="bi bi-box-arrow-in-right"></i></div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="text-muted">Sign in to your CommunityConnect account</p>
          </div>

          <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <div class="input-group cc-input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="you@example.com" required autofocus>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <div class="input-group cc-input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Your password" required>
                <button class="btn btn-outline-secondary toggle-pw" type="button" tabindex="-1">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn cc-btn-primary w-100 mt-3 btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
          </form>

          <!-- Quick Demo Accounts -->
          <div class="demo-accounts mt-4">
            <p class="demo-label text-center small text-muted mb-2">— Demo quick-fill —</p>
            <div class="d-flex gap-2 justify-content-center">
              <button class="btn btn-sm btn-outline-secondary demo-fill"
                      data-email="volunteer@demo.com" data-pw="demo123">
                <i class="bi bi-person-heart me-1"></i>Volunteer
              </button>
              <button class="btn btn-sm btn-outline-secondary demo-fill"
                      data-email="organizer@demo.com" data-pw="demo123">
                <i class="bi bi-building me-1"></i>Organizer
              </button>
            </div>
          </div>

          <p class="text-center mt-4 mb-0">
            New here? <a href="{{ url_for('register') }}" class="cc-link fw-semibold">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
